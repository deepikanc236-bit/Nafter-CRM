{% extends "admin/login.html" %}
{% load static i18n %}

{% block extrahead %}{{ block.super }}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% endblock %}

{% block extrastyle %}{{ block.super }}
<link rel="stylesheet" href="{% static 'admin_custom.css' %}">
<style>
    body.login-page {
        background: #f1f5f9 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        height: 100vh !important;
        margin: 0 !important;
    }

    .login-auth-container {
        width: 100% !important;
        max-width: 420px !important;
        padding: 20px !important;
    }

    /* Hide the branding panel completely as requested */
    .login-branding-panel {
        display: none !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-auth-container">
    <div class="login-logo" style="margin-bottom: 30px; text-align: center;">
        <a href="/" style="color: #115e3b; font-weight: 800; font-size: 2.2rem; letter-spacing: -1px;">
            Nafter AI
        </a>
    </div>
    {{ block.super }}
</div>
{% endblock %}
